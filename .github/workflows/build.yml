name: Build FLAC Player APK (Local)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Project Files
        run: |
          mkdir -p src/screens src/components src/hooks src/utils assets
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/java/com/whikao/flacplayer

          cat > package.json << 'EOF'
          {
            "name": "flac-player",
            "version": "1.0.0",
            "main": "index.js",
            "scripts": {
              "android": "react-native run-android",
              "start": "react-native start"
            },
            "dependencies": {
              "react": "18.2.0",
              "react-native": "0.73.0",
              "react-native-track-player": "^4.0.0",
              "@react-native-async-storage/async-storage": "1.21.0",
              "react-native-document-picker": "^9.1.0",
              "react-native-permissions": "^4.0.0"
            },
            "devDependencies": {
              "@babel/core": "^7.20.0",
              "@babel/runtime": "^7.20.0",
              "metro-react-native-babel-preset": "^0.77.0"
            },
            "private": true
          }
          EOF

          cat > android/build.gradle << 'EOF'
          buildscript {
              ext {
                  buildToolsVersion = "34.0.0"
                  minSdkVersion = 21
                  compileSdkVersion = 34
                  targetSdkVersion = 34
                  ndkVersion = "25.1.8937393"
                  kotlinVersion = "1.8.0"
              }
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath("com.android.tools.build:gradle:8.1.1")
                  classpath("com.facebook.react:react-native-gradle-plugin")
                  classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:${kotlinVersion}")
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
                  maven { url 'https://www.jitpack.io' }
              }
          }
          EOF

          cat > android/settings.gradle << 'EOF'
          rootProject.name = 'flacplayer'
          apply from: file("../node_modules/@react-native-community/cli-platform-android/native_modules.gradle"); applyNativeModulesSettingsGradle(settings)
          include ':app'
          EOF

          cat > android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
          android.useAndroidX=true
          android.enableJetifier=true
          FLIPPER_VERSION=0.182.0
          reactNativeArchitectures=arm64-v8a,armeabi-v7a,x86,x86_64
          newArchEnabled=false
          hermesEnabled=true
          EOF

          cat > android/app/build.gradle << 'EOF'
          apply plugin: "com.android.application"
          apply plugin: "com.facebook.react"

          def enableProguardInReleaseBuilds = false
          def jscFlavor = 'org.webkit:android-jsc:+'

          android {
              ndkVersion rootProject.ext.ndkVersion
              buildToolsVersion rootProject.ext.buildToolsVersion
              compileSdkVersion rootProject.ext.compileSdkVersion
              namespace "com.whikao.flacplayer"
              defaultConfig {
                  applicationId "com.whikao.flacplayer"
                  minSdkVersion rootProject.ext.minSdkVersion
                  targetSdkVersion rootProject.ext.targetSdkVersion
                  versionCode 1
                  versionName "1.0"
              }
              signingConfigs {
                  debug {
                      storeFile file('debug.keystore')
                      storePassword 'android'
                      keyAlias 'androiddebugkey'
                      keyPassword 'android'
                  }
                  release {
                      storeFile file('debug.keystore')
                      storePassword 'android'
                      keyAlias 'androiddebugkey'
                      keyPassword 'android'
                  }
              }
              buildTypes {
                  debug {
                      signingConfig signingConfigs.debug
                  }
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled enableProguardInReleaseBuilds
                      proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
                  }
              }
          }

          dependencies {
              implementation("com.facebook.react:react-android")
              implementation("com.facebook.react:hermes-android")
          }
          EOF

          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <application
                  android:name=".MainApplication"
                  android:label="FLAC Player"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:allowBackup="false"
                  android:theme="@style/AppTheme"
                  android:supportsRtl="true">
                  <activity
                      android:name=".MainActivity"
                      android:label="FLAC Player"
                      android:configChanges="keyboard|keyboardHidden|orientation|screenLayout|screenSize|smallestScreenSize|uiMode"
                      android:launchMode="singleTask"
                      android:windowSoftInputMode="adjustResize"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > android/app/src/main/res/values/styles.xml << 'EOF'
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.DayNight.NoActionBar">
                  <item name="android:editTextBackground">@android:color/transparent</item>
              </style>
          </resources>
          EOF

          cat > android/app/src/main/java/com/whikao/flacplayer/MainActivity.java << 'EOF'
          package com.whikao.flacplayer;
          import com.facebook.react.ReactActivity;
          import com.facebook.react.ReactActivityDelegate;
          import com.facebook.react.defaults.DefaultNewArchitectureEntryPoint;
          import com.facebook.react.defaults.DefaultReactActivityDelegate;
          import android.os.Bundle;

          public class MainActivity extends ReactActivity {
              @Override
              protected String getMainComponentName() {
                  return "flacplayer";
              }

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(null);
              }

              @Override
              protected ReactActivityDelegate createReactActivityDelegate() {
                  return new DefaultReactActivityDelegate(
                      this,
                      getMainComponentName(),
                      DefaultNewArchitectureEntryPoint.getFabricEnabled());
              }
          }
          EOF

          cat > android/app/src/main/java/com/whikao/flacplayer/MainApplication.java << 'EOF'
          package com.whikao.flacplayer;
          import android.app.Application;
          import com.facebook.react.PackageList;
          import com.facebook.react.ReactApplication;
          import com.facebook.react.ReactNativeHost;
          import com.facebook.react.ReactPackage;
          import com.facebook.react.defaults.DefaultNewArchitectureEntryPoint;
          import com.facebook.react.defaults.DefaultReactNativeHost;
          import com.facebook.soloader.SoLoader;
          import java.util.List;

          public class MainApplication extends Application implements ReactApplication {
              private final ReactNativeHost mReactNativeHost = new DefaultReactNativeHost(this) {
                  @Override
                  public boolean getUseDeveloperSupport() {
                      return BuildConfig.DEBUG;
                  }

                  @Override
                  protected List<ReactPackage> getPackages() {
                      return new PackageList(this).getPackages();
                  }

                  @Override
                  protected String getJSMainModuleName() {
                      return "index";
                  }

                  @Override
                  protected boolean isNewArchEnabled() {
                      return BuildConfig.IS_NEW_ARCHITECTURE_ENABLED;
                  }

                  @Override
                  protected Boolean isHermesEnabled() {
                      return BuildConfig.IS_HERMES_ENABLED;
                  }
              };

              @Override
              public ReactNativeHost getReactNativeHost() {
                  return mReactNativeHost;
              }

              @Override
              public void onCreate() {
                  super.onCreate();
                  SoLoader.init(this, false);
                  if (BuildConfig.IS_NEW_ARCHITECTURE_ENABLED) {
                      DefaultNewArchitectureEntryPoint.load();
                  }
              }
          }
          EOF

          cat > index.js << 'EOF'
          import { AppRegistry } from 'react-native';
          import App from './App';
          AppRegistry.registerComponent('flacplayer', () => App);
          EOF

          cat > metro.config.js << 'EOF'
          const { getDefaultConfig, mergeConfig } = require('@react-native/metro-config');
          const config = {};
          module.exports = mergeConfig(getDefaultConfig(__dirname), config);
          EOF

          cat > babel.config.js << 'EOF'
          module.exports = {
            presets: ['module:metro-react-native-babel-preset'],
          };
          EOF

      - name: Create App.js
        run: |
          cat > App.js << 'APPEOF'
          import React, { useState, useEffect, useRef } from 'react';
          import {
            View, Text, StyleSheet, TouchableOpacity, ScrollView,
            Animated, Dimensions, Modal, StatusBar,
          } from 'react-native';
          import TrackPlayer, {
            Event, State, Capability, usePlaybackState, useProgress,
            useTrackPlayerEvents,
          } from 'react-native-track-player';
          import DocumentPicker from 'react-native-document-picker';
          import AsyncStorage from '@react-native-async-storage/async-storage';

          const { width } = Dimensions.get('window');

          const formatTime = (seconds) => {
            if (!isFinite(seconds) || seconds < 0) return '0:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
          };

          export default function App() {
            const [playlist, setPlaylist] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(-1);
            const [currentTrack, setCurrentTrack] = useState(null);
            const [avatarUri, setAvatarUri] = useState(null);
            const [showPlaylist, setShowPlaylist] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [sleepTimeLeft, setSleepTimeLeft] = useState(null);
            const [shuffleMode, setShuffleMode] = useState(false);

            const playbackState = usePlaybackState();
            const progress = useProgress();
            const isPlaying = playbackState.state === State.Playing;

            const sleepTimerRef = useRef(null);
            const sleepIntervalRef = useRef(null);
            const scaleAnim = useRef(new Animated.Value(1)).current;
            const vizBars = useRef(Array(20).fill(0).map(() => new Animated.Value(4))).current;

            useEffect(() => {
              setupPlayer();
              loadAvatar();
              return () => {
                TrackPlayer.destroy();
                clearSleepTimer();
              };
            }, []);

            useEffect(() => {
              if (isPlaying) {
                Animated.loop(
                  Animated.sequence([
                    Animated.timing(scaleAnim, { toValue: 1.02, duration: 2000, useNativeDriver: true }),
                    Animated.timing(scaleAnim, { toValue: 1, duration: 2000, useNativeDriver: true }),
                  ])
                ).start();
              } else {
                scaleAnim.setValue(1);
              }
            }, [isPlaying]);

            useEffect(() => {
              if (!isPlaying) {
                vizBars.forEach(bar => bar.setValue(4));
                return;
              }
              const anims = vizBars.map((bar) => {
                return Animated.loop(
                  Animated.sequence([
                    Animated.timing(bar, { toValue: 4 + Math.random() * 36, duration: 200 + Math.random() * 300, useNativeDriver: false }),
                    Animated.timing(bar, { toValue: 4 + Math.random() * 20, duration: 200 + Math.random() * 300, useNativeDriver: false }),
                  ])
                );
              });
              anims.forEach(a => a.start());
              return () => anims.forEach(a => a.stop());
            }, [isPlaying]);

            const setupPlayer = async () => {
              try {
                await TrackPlayer.setupPlayer({ autoHandleInterruptions: true });
                await TrackPlayer.updateOptions({
                  capabilities: [Capability.Play, Capability.Pause, Capability.SkipToNext, Capability.SkipToPrevious, Capability.SeekTo],
                  compactCapabilities: [Capability.Play, Capability.Pause, Capability.SkipToNext],
                });
              } catch (e) { console.log('Player already setup'); }
            };

            const loadAvatar = async () => {
              const saved = await AsyncStorage.getItem('userAvatar');
              if (saved) setAvatarUri(saved);
            };

            const pickMusic = async () => {
              try {
                const result = await DocumentPicker.pickMultiple({
                  type: [DocumentPicker.types.audio],
                  copyTo: 'cachesDirectory',
                });

                const newTracks = result.map((file, idx) => ({
                  id: `track-${Date.now()}-${idx}`,
                  url: file.fileCopyUri || file.uri,
                  title: file.name?.replace(/\.[^/.]+$/, '') || '未知歌曲',
                  artist: '本地文件', duration: 0,
                }));

                setPlaylist(prev => {
                  const updated = [...prev, ...newTracks];
                  if (currentIndex === -1 && updated.length > 0) {
                    setTimeout(() => loadTrack(0, updated), 100);
                  }
                  return updated;
                });
              } catch (err) { 
                if (!DocumentPicker.isCancel(err)) console.error('Pick error:', err); 
              }
            };

            const loadTrack = async (index, trackList = playlist) => {
              if (index < 0 || index >= trackList.length) return;

              setCurrentIndex(index);
              const track = trackList[index];
              setCurrentTrack(track);

              await TrackPlayer.reset();
              await TrackPlayer.add({
                id: track.id, url: track.url,
                title: track.title, artist: track.artist,
              });
            };

            const play = async () => { await TrackPlayer.play(); };
            const pause = async () => { await TrackPlayer.pause(); };

            const next = async () => {
              if (playlist.length === 0) return;
              let nextIdx = shuffleMode ? Math.floor(Math.random() * playlist.length)
                : (currentIndex < playlist.length - 1 ? currentIndex + 1 : 0);
              await loadTrack(nextIdx);
              await play();
            };

            const previous = async () => {
              if (playlist.length === 0) return;
              const prevIdx = currentIndex > 0 ? currentIndex - 1 : playlist.length - 1;
              await loadTrack(prevIdx);
              await play();
            };

            const seekTo = async (positionSec) => {
              await TrackPlayer.seekTo(positionSec);
            };

            const playTrackAtIndex = async (index) => {
              await loadTrack(index);
              await play();
            };

            const setSleepTimer = (minutes, seconds) => {
              const totalMs = (minutes * 60 + seconds) * 1000;
              if (totalMs <= 0) { clearSleepTimer(); return; }
              clearSleepTimer();
              const endTime = Date.now() + totalMs;
              sleepTimerRef.current = setTimeout(() => { pause(); clearSleepTimer(); }, totalMs);
              sleepIntervalRef.current = setInterval(() => {
                const remaining = Math.max(0, endTime - Date.now());
                if (remaining <= 0) { setSleepTimeLeft(null); return; }
                const m = Math.floor(remaining / 60000);
                const s = Math.floor((remaining % 60000) / 1000);
                setSleepTimeLeft(`${m}:${s < 10 ? '0' : ''}${s}`);
              }, 1000);
            };

            const clearSleepTimer = () => {
              if (sleepTimerRef.current) { clearTimeout(sleepTimerRef.current); sleepTimerRef.current = null; }
              if (sleepIntervalRef.current) { clearInterval(sleepIntervalRef.current); sleepIntervalRef.current = null; }
              setSleepTimeLeft(null);
            };

            const pickAvatar = async () => {
              try {
                const result = await DocumentPicker.pickSingle({ type: [DocumentPicker.types.images], copyTo: 'cachesDirectory' });
                setAvatarUri(result.fileCopyUri || result.uri);
                await AsyncStorage.setItem('userAvatar', result.fileCopyUri || result.uri);
              } catch (err) {
                if (!DocumentPicker.isCancel(err)) console.error('Avatar error:', err);
              }
            };

            const lyrics = [
              { time: 0, text: '♪ 音乐开始 ♪' }, { time: 5, text: '高解析度 FLAC 音乐' },
              { time: 10, text: '无损音质完美还原' }, { time: 15, text: '歌词同步滚动显示' },
              { time: 20, text: '支持睡眠定时器' }, { time: 25, text: '点击头像可更换' },
              { time: 30, text: '♪ 享受音乐 ♪' }, { time: 35, text: '每一个音符都清晰可辨' },
              { time: 40, text: 'FLAC 格式原生支持' }, { time: 45, text: '高品质音乐体验' },
              { time: 50, text: '♪ 音乐继续 ♪' }, { time: 60, text: '感谢使用 FLAC Player' },
            ];

            const currentLyricIndex = lyrics.reduce((idx, line, i) => 
              progress.position >= line.time ? i : idx, -1);

            return (
              <View style={styles.container}>
                <StatusBar barStyle="light-content" backgroundColor="#0a0a0f" />
                <View style={styles.header}>
                  <View style={styles.formatBadge}><Text style={styles.formatText}>FLAC</Text></View>
                  <Text style={styles.sampleRate}>{currentTrack ? '48.0 kHz / 24 bit' : '-- kHz / -- bit'}</Text>
                  {sleepTimeLeft && <View style={styles.sleepIndicator}><Text style={styles.sleepText}>⏱ {sleepTimeLeft}</Text></View>}
                </View>

                <ScrollView style={styles.scrollView} showsVerticalScrollIndicator={false}>
                  <View style={styles.albumSection}>
                    <TouchableOpacity onPress={pickMusic} activeOpacity={0.9}>
                      <Animated.View style={[styles.albumArtWrapper, { transform: [{ scale: scaleAnim }] }]}>
                        <View style={styles.albumPlaceholder}>
                          <Text style={styles.albumIcon}>🎵</Text>
                          <Text style={styles.albumHint}>点击选择 FLAC 文件</Text>
                        </View>
                      </Animated.View>
                    </TouchableOpacity>
                    <TouchableOpacity style={styles.avatarOverlay} onPress={pickAvatar}>
                      {avatarUri ? <Animated.Image source={{ uri: avatarUri }} style={styles.avatarImage} /> 
                        : <View style={styles.avatarPlaceholder}><Text style={styles.avatarText}>U</Text></View>}
                    </TouchableOpacity>
                  </View>

                  <View style={styles.trackInfo}>
                    <Text style={styles.trackTitle} numberOfLines={1}>{currentTrack?.title || '未选择歌曲'}</Text>
                    <Text style={styles.trackArtist} numberOfLines={1}>{currentTrack?.artist || '点击上方选择 FLAC 文件'}</Text>
                  </View>

                  <View style={styles.visualizer}>
                    {vizBars.map((bar, i) => (
                      <Animated.View key={i} style={[styles.vizBar, { height: bar }]} />
                    ))}
                  </View>

                  <View style={styles.lyricsSection}>
                    <ScrollView ref={ref => ref && currentLyricIndex >= 0 && setTimeout(() => ref.scrollTo({ y: currentLyricIndex * 40 - 40, animated: true }), 100)} showsVerticalScrollIndicator={false}>
                      {lyrics.map((line, i) => (
                        <Text key={i} style={[styles.lyricLine, i === currentLyricIndex && styles.lyricActive, i < currentLyricIndex && styles.lyricPast]}>
                          {line.text}
                        </Text>
                      ))}
                    </ScrollView>
                  </View>

                  <View style={styles.progressSection}>
                    <TouchableOpacity style={styles.progressBarWrapper} onPress={(e) => {
                      const { locationX } = e.nativeEvent;
                      seekTo((locationX / (width - 56)) * progress.duration);
                    }}>
                      <View style={styles.progressBarBg}>
                        <View style={[styles.progressBarFill, { width: `${progress.duration > 0 ? (progress.position / progress.duration) * 100 : 0}%` }]} />
                      </View>
                    </TouchableOpacity>
                  </View>

                  <View style={styles.timeDisplay}>
                    <Text style={styles.timeText}>{formatTime(progress.position)}</Text>
                    <Text style={styles.timeText}>{formatTime(progress.duration)}</Text>
                  </View>

                  <View style={styles.controls}>
                    <TouchableOpacity style={styles.controlBtn} onPress={() => setShuffleMode(!shuffleMode)}>
                      <Text style={[styles.controlIcon, shuffleMode && { color: '#7c3aed' }]}>🔀</Text>
                    </TouchableOpacity>
                    <TouchableOpacity style={styles.controlBtn} onPress={previous}><Text style={styles.controlIcon}>⏮</Text></TouchableOpacity>
                    <TouchableOpacity style={styles.playBtn} onPress={isPlaying ? pause : play}>
                      <Text style={styles.playIcon}>{isPlaying ? '⏸' : '▶'}</Text>
                    </TouchableOpacity>
                    <TouchableOpacity style={styles.controlBtn} onPress={next}><Text style={styles.controlIcon}>⏭</Text></TouchableOpacity>
                    <TouchableOpacity style={styles.controlBtn} onPress={() => setShowPlaylist(true)}><Text style={styles.controlIcon}>☰</Text></TouchableOpacity>
                  </View>
                </ScrollView>

                <TouchableOpacity style={styles.settingsToggle} onPress={() => setShowSettings(true)}>
                  <Text style={styles.settingsToggleText}>⚙</Text>
                </TouchableOpacity>

                <Modal visible={showPlaylist} transparent animationType="slide" onRequestClose={() => setShowPlaylist(false)}>
                  <View style={styles.modalOverlay}>
                    <View style={styles.playlistModal}>
                      <View style={styles.playlistHeader}>
                        <Text style={styles.playlistTitle}>播放列表</Text>
                        <TouchableOpacity onPress={() => setShowPlaylist(false)}><Text style={styles.closeBtn}>✕</Text></TouchableOpacity>
                      </View>
                      <ScrollView>
                        {playlist.map((track, i) => (
                          <TouchableOpacity key={track.id} style={[styles.playlistItem, i === currentIndex && styles.playlistItemActive]} onPress={() => { playTrackAtIndex(i); setShowPlaylist(false); }}>
                            <Text style={[styles.playlistNum, i === currentIndex && { color: '#7c3aed' }]}>{i === currentIndex && isPlaying ? '▶' : i + 1}</Text>
                            <View style={styles.playlistInfo}>
                              <Text style={styles.playlistTitleText} numberOfLines={1}>{track.title}</Text>
                              <Text style={styles.playlistArtist}>本地 FLAC</Text>
                            </View>
                            <Text style={styles.playlistDuration}>{formatTime(track.duration)}</Text>
                          </TouchableOpacity>
                        ))}
                        {playlist.length === 0 && <Text style={styles.emptyPlaylist}>暂无歌曲，点击添加</Text>}
                      </ScrollView>
                      <TouchableOpacity style={styles.addBtn} onPress={pickMusic}><Text style={styles.addBtnText}>+ 添加音乐</Text></TouchableOpacity>
                    </View>
                  </View>
                </Modal>

                <Modal visible={showSettings} transparent animationType="slide" onRequestClose={() => setShowSettings(false)}>
                  <View style={styles.modalOverlay}>
                    <View style={styles.settingsModal}>
                      <View style={styles.settingsHeader}>
                        <Text style={styles.settingsTitle}>播放设置</Text>
                        <TouchableOpacity onPress={() => setShowSettings(false)}><Text style={styles.closeBtn}>✕</Text></TouchableOpacity>
                      </View>
                      <ScrollView>
                        <View style={styles.settingRow}>
                          <Text style={styles.settingLabel}>⏱ 睡眠定时器</Text>
                          <TouchableOpacity style={styles.timeBtn} onPress={() => { setSleepTimer(5, 0); setShowSettings(false); }}>
                            <Text style={styles.timeBtnText}>设置5分钟</Text>
                          </TouchableOpacity>
                        </View>
                        <TouchableOpacity style={styles.settingRow} onPress={pickAvatar}>
                          <Text style={styles.settingLabel}>👤 更换头像</Text>
                          <Text style={styles.settingArrow}>›</Text>
                        </TouchableOpacity>
                        {sleepTimeLeft && (
                          <TouchableOpacity style={[styles.settingRow, { backgroundColor: 'rgba(239,68,68,0.1)' }]} onPress={() => { clearSleepTimer(); setShowSettings(false); }}>
                            <Text style={[styles.settingLabel, { color: '#ef4444' }]}>✕ 取消睡眠定时器</Text>
                          </TouchableOpacity>
                        )}
                      </ScrollView>
                    </View>
                  </View>
                </Modal>
              </View>
            );
          }

          const styles = StyleSheet.create({
            container: { flex: 1, backgroundColor: '#0a0a0f' },
            header: { flexDirection: 'row', justifyContent: 'space-between', alignItems: 'center', paddingHorizontal: 20, paddingTop: 50, paddingBottom: 12 },
            formatBadge: { backgroundColor: '#7c3aed', paddingHorizontal: 8, paddingVertical: 2, borderRadius: 4 },
            formatText: { color: '#fff', fontSize: 10, fontWeight: '700', letterSpacing: 0.5 },
            sampleRate: { color: '#5a5a6a', fontSize: 12 },
            sleepIndicator: { position: 'absolute', right: 20, top: 50 },
            sleepText: { color: '#f59e0b', fontSize: 11 },
            scrollView: { flex: 1 },
            albumSection: { alignItems: 'center', paddingVertical: 20, position: 'relative' },
            albumArtWrapper: { width: 280, height: 280, borderRadius: 20, overflow: 'hidden', shadowColor: '#7c3aed', shadowOffset: { width: 0, height: 20 }, shadowOpacity: 0.3, shadowRadius: 40, elevation: 20 },
            albumPlaceholder: { width: '100%', height: '100%', backgroundColor: '#12121a', justifyContent: 'center', alignItems: 'center' },
            albumIcon: { fontSize: 60, opacity: 0.3 },
            albumHint: { color: '#5a5a6a', fontSize: 13, marginTop: 8 },
