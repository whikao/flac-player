name: Build FLAC Player APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取项目源码（必须确保你已将 App.js, package.json, app.json 等源码推送到仓库）
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Node.js 并开启缓存（加速后续 npm install）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. 配置 Expo 和 EAS 环境
      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # 4. 安装项目依赖（注意：建议用 npm ci 替代 npm install 加快 CI 环境构建）
      - name: Install dependencies
        run: npm ci

      # 5. 初始化/关联 EAS 项目（去掉了非法的 --id 字符串）
      # 如果 app.json 中已经配置了 extra.eas.projectId，这一步会自动跳过
      - name: Register project with EAS
        run: npx eas init --non-interactive || true

      # 6. 开始构建 Android APK
      - name: Build Android APK with EAS
        run: npx eas build --platform android --profile preview --non-interactive

      # 7. 上传构建日志/产物（可选）
      - name: Upload build info
        uses: actions/upload-artifact@v4
        with:
          name: build-info
          path: |
            ./
            !node_modules
